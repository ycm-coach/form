<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料相談 事前ヒアリング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F4;
    --blush: #F5E6E0;
    --rose: #E8A598;
    --rose-dark: #C97B6E;
    --rose-deep: #A85A50;
    --text-primary: #2C1F1A;
    --text-secondary: #7A6058;
    --text-muted: #B09890;
    --border: #E8D5CE;
    --white: #FFFFFF;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 16px 80px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--rose-deep);
    border: 1px solid var(--rose);
    border-radius: 20px;
    padding: 5px 16px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--text-secondary);
    margin-bottom: 10px;
    font-weight: 400;
  }

  .header h2 {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text-primary);
    margin-bottom: 12px;
  }

  .header p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--rose);
  }

  /* カード */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  /* セクションラベル */
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .label-beauty { background: #FEF0E6; color: #B36A30; }
  .label-love   { background: #FDE8EF; color: #B3366A; }
  .label-mind   { background: #EEE9FE; color: #5540C0; }
  .label-info   { background: var(--blush); color: var(--rose-deep); }

  /* フォーム要素 */
  .field {
    margin-bottom: 22px;
  }
  .field:last-child { margin-bottom: 0; }

  label.field-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .field-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .required {
    display: inline-block;
    font-size: 10px;
    color: var(--rose-deep);
    background: #FDE8EF;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
    font-weight: 400;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  textarea,
  select {
    width: 100%;
    padding: 12px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--rose);
    background: var(--white);
  }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }

  textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

  /* ラジオ・チェックボックス */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .options.inline { flex-direction: row; flex-wrap: wrap; gap: 8px; }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 12px 14px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    transition: border-color 0.2s, background 0.2s;
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.5;
    user-select: none;
  }
  .option-item:hover {
    border-color: var(--rose);
  }
  .option-item input[type="radio"],
  .option-item input[type="checkbox"] {
    appearance: none;
    width: 18px;
    height: 18px;
    min-width: 18px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: var(--white);
    margin: 0;
    padding: 0;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-item input[type="checkbox"] {
    border-radius: 5px;
  }
  .option-item input[type="radio"]:checked,
  .option-item input[type="checkbox"]:checked {
    border-color: var(--rose-dark);
    background: var(--rose-dark);
  }
  .option-item input[type="radio"]:checked::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--white);
  }
  .option-item input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%) rotate(45deg);
    width: 4px; height: 8px;
    border-right: 2px solid var(--white);
    border-bottom: 2px solid var(--white);
  }
  .option-item:has(input:checked) {
    border-color: var(--rose-dark);
    background: #FEF5F3;
  }

  /* スケール */
  .scale-wrap { display: flex; flex-direction: column; gap: 8px; }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
  }
  .scale-items { display: flex; gap: 8px; }
  .scale-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .scale-item input[type="radio"] {
    appearance: none;
    width: 36px; height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: var(--cream);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .scale-item input[type="radio"]:checked {
    background: var(--rose-dark);
    border-color: var(--rose-dark);
  }
  .scale-item input[type="radio"]:checked::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--white);
  }
  .scale-item span {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* 送信ボタン */
  .submit-wrap { text-align: center; margin-top: 28px; }

  .btn-submit {
    display: inline-block;
    width: 100%;
    max-width: 360px;
    padding: 16px 32px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    background: linear-gradient(135deg, var(--rose) 0%, var(--rose-deep) 100%);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }

  .submit-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  /* サンクス画面 */
  #thanks {
    display: none;
    text-align: center;
    padding: 60px 24px;
  }
  #thanks .thanks-icon {
    font-size: 40px;
    margin-bottom: 20px;
  }
  #thanks h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text-primary);
  }
  #thanks p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  /* エラー */
  .error-msg {
    font-size: 12px;
    color: var(--rose-deep);
    margin-top: 6px;
    display: none;
  }
  .field.has-error input,
  .field.has-error textarea,
  .field.has-error select {
    border-color: var(--rose-deep);
  }
  .field.has-error .error-msg { display: block; }

  @media (max-width: 480px) {
    .card { padding: 22px 18px; }
    .scale-item input[type="radio"] { width: 30px; height: 30px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <h1>CONSULTATION FORM</h1>
    <h2>無料相談<br>事前ヒアリングフォーム</h2>
    <p>あなたのことをもっと知るために、<br>いくつかお聞かせください。<br>所要時間：約3〜5分</p>
  </div>

  <div class="divider"><div class="divider-dot"></div></div>

  <form id="form">

    <!-- 基本情報 -->
    <div class="card">
      <div class="section-label label-info">基本情報</div>

      <div class="field" id="field-name">
        <label class="field-label" for="name">お名前（ニックネームでも可）<span class="required">必須</span></label>
        <input type="text" id="name" name="name" placeholder="例：さくら、みき">
        <p class="error-msg">お名前を入力してください</p>
      </div>

      <div class="field" id="field-age">
        <label class="field-label" for="age">年齢<span class="required">必須</span></label>
        <select id="age" name="age">
          <option value="">選択してください</option>
          <option value="20-24">20〜24歳</option>
          <option value="25-29">25〜29歳</option>
          <option value="30-34">30〜34歳</option>
          <option value="35-39">35〜39歳</option>
          <option value="other">その他</option>
        </select>
        <p class="error-msg">年齢を選択してください</p>
      </div>

      <div class="field" id="field-email">
        <label class="field-label" for="email">メールアドレス<span class="required">必須</span></label>
        <input type="email" id="email" name="email" placeholder="example@email.com">
        <p class="error-msg">正しいメールアドレスを入力してください</p>
      </div>
    </div>

    <!-- BEAUTY -->
    <div class="card">

      <div class="field">
        <label class="field-label">美容・体型について、当てはまるものを選んでください<br><span class="field-note">（複数選択可）</span></label>
        <div class="options">
          <label class="option-item">
            <input type="checkbox" name="beauty[]" value="skin">肌質が気になっている（乾燥・ニキビ・くすみなど）
          </label>
          <label class="option-item">
            <input type="checkbox" name="beauty[]" value="body">体型を変えたいと思っているが、なかなか続かない
          </label>
          <label class="option-item">
            <input type="checkbox" name="beauty[]" value="makeup">メイクやスキンケアを見直したいが何から始めたらいいかわからない
          </label>
          <label class="option-item">
            <input type="checkbox" name="beauty[]" value="habit">わかっているのに、つい「また明日」にしてしまう
          </label>
        </div>
      </div>
    </div>

    <!-- LOVE -->
    <div class="card">

      <div class="field">
        <label class="field-label">恋愛・人間関係について、今の状況を教えてください<span class="required">必須</span></label>
        <div class="options">
          <label class="option-item">
            <input type="radio" name="love_status" value="leaving">離れた方がいいとわかっているのに、離れられない
          </label>
          <label class="option-item">
            <input type="radio" name="love_status" value="lonely">ひとりでいることが怖く、誰かそばにいないと不安
          </label>
          <label class="option-item">
            <input type="radio" name="love_status" value="chosen">いつも「選ばれる側」で、自分から動けない
          </label>
          <label class="option-item">
            <input type="radio" name="love_status" value="no_issue">恋愛の悩みはとくにない
          </label>
        </div>
      </div>
    </div>

    <!-- MIND -->
    <div class="card">

      <div class="field">
        <label class="field-label">今の自分に対して、どんなふうに感じますか？<br><span class="field-note">（複数選択可）</span></label>
        <div class="options">
          <label class="option-item">
            <input type="checkbox" name="mind[]" value="self_blame">つい自分を責めてしまうことが多い
          </label>
          <label class="option-item">
            <input type="checkbox" name="mind[]" value="tired_positive">前向きになろうとするたびに落ちる、その繰り返しに疲れた
          </label>
          <label class="option-item">
            <input type="checkbox" name="mind[]" value="know_not_move">頭でわかっているのに、行動に移せない
          </label>
          <label class="option-item">
            <input type="checkbox" name="mind[]" value="confident">自分に自信が持てず、比べてしまうことが多い
          </label>
        </div>
      </div>

      <div class="field">
        <label class="field-label">今の自分への満足度はどのくらいですか？</label>
        <div class="scale-wrap">
          <div class="scale-labels">
            <span>全然満足していない</span>
            <span>とても満足している</span>
          </div>
          <div class="scale-items">
            <label class="scale-item"><input type="radio" name="satisfaction" value="1"><span>1</span></label>
            <label class="scale-item"><input type="radio" name="satisfaction" value="2"><span>2</span></label>
            <label class="scale-item"><input type="radio" name="satisfaction" value="3"><span>3</span></label>
            <label class="scale-item"><input type="radio" name="satisfaction" value="4"><span>4</span></label>
            <label class="scale-item"><input type="radio" name="satisfaction" value="5"><span>5</span></label>
          </div>
        </div>
      </div>
    </div>

    <!-- 自由記述 -->
    <div class="card">
      <div class="field">
        <label class="field-label" for="trigger">申し込もうと思ったきっかけを教えてください</label>
        <textarea id="trigger" name="trigger" placeholder="例：ずっと変わろうと思っていたけど、一人ではなかなか動けなくて…"></textarea>
      </div>
    </div>

    <!-- 送信 -->
    <div class="submit-wrap">
      <button type="submit" class="btn-submit">送信する</button>
      <p class="submit-note">送信後、担当者よりご連絡いたします</p>
    </div>

  </form>

  <!-- サンクス -->
  <div id="thanks" class="card">
    <div class="thanks-icon">🌸</div>
    <h3>送信が完了しました</h3>
    <p>ヒアリングにご協力いただき、<br>ありがとうございます。<br><br>担当者より2〜3営業日以内に<br>ご連絡いたします。<br>楽しみにお待ちください。</p>
  </div>

</div>

<script>
// ---- バリデーション ----
function validate() {
  let ok = true;

  const nameField = document.getElementById('field-name');
  const nameVal = document.getElementById('name').value.trim();
  nameField.classList.toggle('has-error', !nameVal);
  if (!nameVal) ok = false;

  const ageField = document.getElementById('field-age');
  const ageVal = document.getElementById('age').value;
  ageField.classList.toggle('has-error', !ageVal);
  if (!ageVal) ok = false;

  const emailField = document.getElementById('field-email');
  const emailVal = document.getElementById('email').value.trim();
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal);
  emailField.classList.toggle('has-error', !emailOk);
  if (!emailOk) ok = false;

  return ok;
}

// ---- フォームデータ収集 ----
function collectData() {
  const get = id => document.getElementById(id)?.value?.trim() ?? '';
  const checks = name => [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(el => el.value);
  const radio = name => document.querySelector(`input[name="${name}"]:checked`)?.value ?? '';

  const beautyMap = {
    skin: '肌質が気になっている（乾燥・ニキビ・くすみなど）',
    body: '体型を変えたいと思っているが、なかなか続かない',
    makeup: 'メイクやスキンケアを見直したいが何から始めたらいいかわからない',
    habit: 'わかっているのに、つい「また明日」にしてしまう',
  };
  const loveMap = {
    leaving: '離れた方がいいとわかっているのに、離れられない',
    lonely: 'ひとりでいることが怖く、誰かそばにいないと不安',
    chosen: 'いつも「選ばれる側」で、自分から動けない',
    no_issue: '恋愛の悩みはとくにない',
  };
  const mindMap = {
    self_blame: 'つい自分を責めてしまうことが多い',
    tired_positive: '前向きになろうとするたびに落ちる、その繰り返しに疲れた',
    know_not_move: '頭でわかっているのに、行動に移せない',
    confident: '自分に自信が持てず、比べてしまうことが多い',
  };
  const ageMap = {
    '20-24': '20〜24歳',
    '25-29': '25〜29歳',
    '30-34': '30〜34歳',
    '35-39': '35〜39歳',
    other: 'その他',
  };

  return {
    timestamp: new Date().toLocaleString('ja-JP'),
    name: get('name'),
    age: ageMap[get('age')] || get('age'),
    email: get('email'),
    beauty: checks('beauty[]').map(v => beautyMap[v] || v).join('、'),
    love_status: loveMap[radio('love_status')] || radio('love_status'),
    mind: checks('mind[]').map(v => mindMap[v] || v).join('、'),
    satisfaction: radio('satisfaction'),
    trigger: get('trigger'),
  };
}

// ---- GAS エンドポイントに送信 ----
// ★ 下の URL を GAS デプロイ後の URL に差し替えてください ★
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzDajseUHcrOJkk7Dd3Cwzl-xixN17t9KuzeWqbfmEZ4F5QgIBfA4ayFh_hUDD30vahhQ/exec';

document.getElementById('form').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (!validate()) {
    document.querySelector('.has-error')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const btn = document.querySelector('.btn-submit');
  btn.textContent = '送信中…';
  btn.disabled = true;

  const data = collectData();

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
  } catch (_) {}

  document.getElementById('form').style.display = 'none';
  document.getElementById('thanks').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
